<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motion AI - Image to Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 8px;
      background: linear-gradient(to right, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.subtitle {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: white;
      font-size: 14px;
    }
    .upload-area {
      border: 2px dashed #444;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s;
    }
    .upload-area:hover { border-color: #a855f7; }
    .upload-area p { color: #666; font-size: 14px; margin-top: 8px; }
    #preview {
      width: 100%;
      border-radius: 10px;
      margin-top: 12px;
      display: none;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #a855f7, #3b82f6);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      text-align: center;
      color: #a855f7;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    #result { display: none; margin-top: 16px; }
    #result video { width: 100%; border-radius: 12px; }
    .download-btn {
      display: block;
      text-align: center;
      margin-top: 10px;
      padding: 12px;
      background: #1a1a1a;
      border: 1px solid #a855f7;
      border-radius: 12px;
      color: #a855f7;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>✨ Motion AI</h1>
  <p class="subtitle">Ubah gambar menjadi video dengan AI</p>

  <div class="card">
    <label>🔑 Fal.ai API Key</label>
    <input type="password" id="apiKey" placeholder="Masukkan API key kamu...">
  </div>

  <div class="card">
    <label>🖼️ Upload Gambar</label>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <span style="font-size:36px">📁</span>
      <p>Tap untuk pilih gambar</p>
      <p style="font-size:12px">(JPG, PNG — max 5MB)</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <img id="preview" alt="Preview gambar">
  </div>

  <button class="btn" id="generateBtn" onclick="generateVideo()">
    🎬 Generate Video
  </button>

  <p id="status">⏳ Sedang memproses... mohon tunggu</p>

  <div id="result">
    <div class="card">
      <label>🎥 Hasil Video</label>
      <video id="outputVideo" controls autoplay loop></video>
      <a id="downloadBtn" class="download-btn" download="motion-ai-video.mp4">
        ⬇️ Download Video
      </a>
    </div>
  </div>

  <script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const preview = document.getElementById('preview');
        preview.src = e.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    async function generateVideo() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];

      if (!apiKey) { alert('⚠️ Masukkan API Key dulu!'); return; }
      if (!file) { alert('⚠️ Pilih gambar dulu!'); return; }

      const btn = document.getElementById('generateBtn');
      const status = document.getElementById('status');
      const result = document.getElementById('result');

      btn.disabled = true;
      btn.textContent = '⏳ Memproses...';
      status.style.display = 'block';
      result.style.display = 'none';

      try {
        status.textContent = '📤 Step 1/3: Mengupload gambar...';
        const imageUrl = await uploadImage(file, apiKey);

        status.textContent = '🎬 Step 2/3: Mengirim ke AI...';
        const requestId = await submitVideo(imageUrl, apiKey);

        status.textContent = '⏳ Step 3/3: AI sedang membuat video...';
        const videoUrl = await pollResult(requestId, apiKey);

        const outputVideo = document.getElementById('outputVideo');
        const downloadBtn = document.getElementById('downloadBtn');
        outputVideo.src = videoUrl;
        downloadBtn.href = videoUrl;
        result.style.display = 'block';
        status.textContent = '✅ Video berhasil dibuat!';

      } catch (error) {
        status.textContent = '❌ Error: ' + error.message;
        alert('Gagal: ' + error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '🎬 Generate Video';
      }
    }

    async function uploadImage(file, apiKey) {
      const response = await fetch('https://rest.alpha.fal.run/storage/upload/initiate', {
        method: 'POST',
        headers: {
          'Authorization': 'Key ' + apiKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          file_name: file.name,
          content_type: file.type
        })
      });
      if (!response.ok) throw new Error('Gagal upload gambar. Cek API key!');
      const data = await response.json();
      await fetch(data.upload_url, {
        method: 'PUT',
        headers: { 'Content-Type': file.type },
        body: file
      });
      return data.file_url;
    }

    async function submitVideo(imageUrl, apiKey) {
      const response = await fetch('https://queue.fal.run/fal-ai/stable-video-diffusion', {
        method: 'POST',
        headers: {
          'Authorization': 'Key ' + apiKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          image_url: imageUrl,
          motion_bucket_id: 127,
          cond_aug: 0.02,
          fps: 7
        })
      });
      if (!response.ok) throw new Error('Gagal submit request ke AI');
      const data = await response.json();
      return data.request_id;
    }

    async function pollResult(requestId, apiKey) {
      const maxTry = 30;
      for (let i = 0; i < maxTry; i++) {
        await new Promise(r => setTimeout(r, 10000));
        const response = await fetch(
          'https://queue.fal.run/fal-ai/stable-video-diffusion/requests/' + requestId,
          { headers: { 'Authorization': 'Key ' + apiKey } }
        );
        const data = await response.json();
        if (data.status === 'COMPLETED') return data.output.video.url;
        if (data.status === 'FAILED') throw new Error('AI gagal membuat video');
      }
      throw new Error('Timeout — proses terlalu lama');
    }
  </script>

</body>
  </html>
